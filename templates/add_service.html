{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Add service</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" class="form-stack">
        <label>Service name</label>
        <input type="text" name="name" value="{{ form_data.get('name', '') if form_data else '' }}" required>

        <label>Duration (minutes)</label>
        <input type="number" name="duration" min="1" value="{{ form_data.get('duration', '') if form_data else '' }}" required>

        <label>Price (DH)</label>
        <input type="number" name="price" min="0" value="{{ form_data.get('price', '') if form_data else '' }}" required>

        <button class="button primary" type="submit">Save service</button>
    </form>
</section>
{% endblock %}
