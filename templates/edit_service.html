{% extends "base.html" %}
{% block content %}
<section class="card">
    <h1>Edit service</h1>
    {% if error %}<p class="error">{{ error }}</p>{% endif %}
    <form method="post" class="form-stack">
        <label>Service name</label>
        <input type="text" name="name" value="{{ service.name }}" required>

        <label>Duration (minutes)</label>
        <input type="number" name="duration" min="1" value="{{ service.duration }}" required>

        <label>Price (DH)</label>
        <input type="number" name="price" min="0" value="{{ service.price }}" required>

        <button class="button primary" type="submit">Update service</button>
    </form>
</section>
{% endblock %}
