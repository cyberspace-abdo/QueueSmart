{% extends "base.html" %}
{% block content %}
<section class="card">
    <div class="card-heading">
        <h1>Services</h1>
        <a class="button primary" href="{{ url_for('add_service', business_id=business.id) }}">Add service</a>
    </div>

    <ul class="service-list">
        {% for service in services %}
        <li class="service-item">
            <div>
                <strong>{{ service.name }}</strong>
                <p>{{ service.duration }} min · {{ service.price }} DH</p>
            </div>
            <div class="links-row">
                <a class="button" href="{{ url_for('edit_service', service_id=service.id) }}">Edit</a>
                <form method="post" action="{{ url_for('delete_service', service_id=service.id) }}">
                    <button class="button danger" type="submit">Delete</button>
                </form>
            </div>
        </li>
        {% else %}
        <li>No services yet.</li>
        {% endfor %}
    </ul>
</section>
{% endblock %}
