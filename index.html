<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rec="stylesheet" href="style.css">
    <title>CrowdWait - Live Line Tracker</title>
</head>
<body>

    <header>
        <h1>⏱️ CrowdWait</h1>
        <p>Skip the lines, crowd-sourced by you.</p>
    </header>

    <div class="container">
        
        <div class="card">
            <h2>Report a Line</h2>
            <label for="location-select">Where are you right now?</label>
            <select id="location-select">
                <option value="coffee">Downtown Coffee Shop</option>
                <option value="grocery">Supermarket Grocery</option>
                <option value="library">Campus Library Office</option>
            </select>

            <label>How is the wait time?</label>
            <div class="btn-group">
                <button class="btn btn-green" onclick="submitReport('No Line (0-5m)')">Clear</button>
                <button class="btn btn-yellow" onclick="submitReport('Moderate (5-15m)')">Short</button>
                <button class="btn btn-red" onclick="submitReport('Busy (15m+)')">Long</button>
            </div>
        </div>

        <div class="card">
            <h2>Live Status Dashboard</h2>
            <label for="dashboard-select">Check live status for:</label>
            <select id="dashboard-select" onchange="updateDashboard()">
                <option value="coffee">Downtown Coffee Shop</option>
                <option value="grocery">Supermarket Grocery</option>
                <option value="library">Campus Library Office</option>
            </select>

            <div id="status-card" class="status-display">
                <div>
                    <div id="display-name" style="font-weight: bold;">Downtown Coffee Shop</div>
                    <div id="display-status" class="status-text">No data yet</div>
                    <div id="display-time" class="time-stamp">Be the first to report!</div>
                </div>
                <div id="display-dot" class="status-dot" style="background-color: #ccc;"></div>
            </div>
        </div>

    </div>

    
</body>
</html>
